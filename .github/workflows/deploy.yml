name: 🚀 Deploy Portfolio

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📥 Install Dependencies
      run: npm install
      
    - name: 🔄 Update Version
      run: npm run version
      
    - name: 🏗️ Build
      run: npm run build
      
    - name: 🚀 Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
        
    - name: 📊 Version Info
      run: |
        echo "📦 Versão: $(node -p "require('./package.json').version")"
        echo "🔢 Build: $(node -p "require('./src/version.json').buildNumber")"
        echo "📅 Data: $(node -p "require('./src/version.json').buildDate")"
